name: Clock In

on:
  workflow_dispatch:
    inputs:
      retry_count:
        description: "Current retry attempt (0 = first run)"
        required: false
        default: "0"

permissions:
  actions: write
  contents: read

jobs:
  clock-in:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TALENTA_EMAIL: ${{ secrets.TALENTA_EMAIL }}
      TALENTA_PASSWORD: ${{ secrets.TALENTA_PASSWORD }}
      HEADLESS: "true"
      TZ: Asia/Jakarta

    steps:
      - name: Record start time
        id: timer
        run: echo "start=$(date +%s)" >> $GITHUB_OUTPUT

      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Route traffic through exit node
        env:
          TS_EXIT_NODES: ${{ secrets.TS_EXIT_NODE }}
        run: |
          # Parse comma-separated exit nodes from secret
          IFS=',' read -ra NODES <<< "$TS_EXIT_NODES"
          echo "Found ${#NODES[@]} exit node(s) to try"

          for i in "${!NODES[@]}"; do
            NODE="${NODES[$i]// /}"  # trim whitespace
            NODE_NUM=$((i + 1))
            echo ""
            echo "========================================="
            echo "Exit node ${NODE_NUM}/${#NODES[@]}: ${NODE:0:8}***"
            echo "========================================="

            for attempt in 1 2 3; do
              echo "--- Attempt ${attempt}/3 for node ${NODE_NUM} ---"
              sudo -E tailscale set --exit-node="$NODE" --accept-routes
              sleep 8

              COUNTRY=$(curl -s --max-time 15 https://ipinfo.io/json | jq -r '.country // empty')
              echo "Detected country: '${COUNTRY}'"

              if [ "$COUNTRY" = "ID" ]; then
                echo "✅ Exit node active — traffic routed through Indonesia"
                curl -s https://ipinfo.io/json | jq '{ip, city, region, country}'
                exit 0
              fi

              echo "⚠️ Country is '${COUNTRY}', expected 'ID'."
              sudo -E tailscale set --exit-node= 2>/dev/null || true
              sleep 3
            done

            echo "❌ Node ${NODE_NUM} failed after 3 attempts, moving to next..."
          done

          echo ""
          echo "❌ All ${#NODES[@]} exit node(s) failed. Dumping diagnostics:"
          sudo tailscale status || true
          exit 1

      - name: Warmup & measure latency
        run: |
          echo "Warming up connection to hr.talenta.co..."
          TOTAL=0
          for i in 1 2 3; do
            TIME=$(curl -o /dev/null -s -w "%{time_total}" --max-time 30 https://hr.talenta.co)
            MS=$(echo "$TIME * 1000" | bc | cut -d. -f1)
            echo "  Request ${i}: ${MS}ms"
            TOTAL=$(echo "$TOTAL + $TIME" | bc)
          done
          AVG=$(echo "scale=1; $TOTAL / 3" | bc)
          AVG_MS=$(echo "$AVG * 1000" | bc | cut -d. -f1)
          echo "Average latency: ${AVG_MS}ms"
          if [ "$(echo "$AVG > 30" | bc)" -eq 1 ]; then
            echo "::warning::High average latency (${AVG_MS}ms) — Playwright timeouts set to 120s to compensate"
          fi

      - name: Random delay
        run: |
          DELAY=$((RANDOM % 121 + 180))
          echo "Waiting ${DELAY}s (~$((DELAY / 60))m) before clock in..."
          sleep $DELAY

      - name: Determine geolocation
        id: geo
        run: |
          DOW=$(date -u +%u)
          if [ "$DOW" = "1" ] || [ "$DOW" = "5" ]; then
            echo "Monday/Friday — using alternate location"
            echo "lat=-6.146282" >> $GITHUB_OUTPUT
            echo "lng=106.810962" >> $GITHUB_OUTPUT
            echo "label=Home (Mon/Fri)" >> $GITHUB_OUTPUT
          else
            echo "Tue-Thu — using default location"
            echo "lat=-6.1993335" >> $GITHUB_OUTPUT
            echo "lng=106.7623687" >> $GITHUB_OUTPUT
            echo "label=Default Office (Tue-Thu)" >> $GITHUB_OUTPUT
          fi

      - name: Record clock time
        id: clock
        run: echo "time=$(date +'%d/%m/%Y %H:%M')" >> $GITHUB_OUTPUT

      - name: Run clock-in
        run: pnpm run clock-in
        env:
          GEO_LAT: ${{ steps.geo.outputs.lat }}
          GEO_LNG: ${{ steps.geo.outputs.lng }}

      - name: Upload error screenshot
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: error-screenshot-clock-in-${{ github.run_number }}
          path: error-*.png
          retention-days: 3

      - name: Notify Telegram
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEO_LABEL: ${{ steps.geo.outputs.label }}
          JOB_STATUS: ${{ job.status }}
          RUN_NUMBER: ${{ github.run_number }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{
            github.run_id }}
          CLOCK_TIME: ${{ steps.clock.outputs.time }}
          START_TIME: ${{ steps.timer.outputs.start }}
          RETRY_COUNT: ${{ github.event.inputs.retry_count || '0' }}
          MAX_RETRY: "2"
        run: |
          if [ "$JOB_STATUS" = "success" ]; then
            EMOJI="✅"; LABEL="Successful"
          elif [ "$JOB_STATUS" = "cancelled" ]; then
            EMOJI="⚠️"; LABEL="Cancelled"
          else
            EMOJI="❌"; LABEL="Failed!"
          fi

          ELAPSED=$(( $(date +%s) - START_TIME ))
          DURATION="$(( ELAPSED / 60 ))m $(( ELAPSED % 60 ))s"

          FAILURE_NOTE=""
          if [ "$JOB_STATUS" = "failure" ]; then
            CURRENT_RETRY=$((RETRY_COUNT))
            HOUR=$(date +%H)
            MINUTE=$(date +%M)
            TIME_NUM=$(( HOUR * 60 + MINUTE ))
            if [ "$CURRENT_RETRY" -lt "$MAX_RETRY" ] && [ "$TIME_NUM" -lt 690 ]; then
              NEXT=$((CURRENT_RETRY + 1))
              FAILURE_NOTE="🔄 <b>Auto-retry ${NEXT}/${MAX_RETRY} starting now...</b>"
            else
              FAILURE_NOTE="⚠️ <b>Action Required:</b> Max retries reached or outside time window. Check error screenshot in artifacts."
            fi
          fi

          NL=$'\n'
          MSG="${EMOJI} <b>Clock In ${LABEL}</b>${NL}"
          MSG+="─────────────────${NL}"
          MSG+="📋 <b>Details:</b>${NL}"
          MSG+="• Workflow: Clock In${NL}"
          MSG+="• Status: ${JOB_STATUS}${NL}"
          MSG+="• Date: ${CLOCK_TIME} WIB${NL}"
          MSG+="• Run: #${RUN_NUMBER} (Attempt #${RUN_ATTEMPT})${NL}"
          MSG+="• Retry: ${RETRY_COUNT}/${MAX_RETRY}${NL}"
          MSG+="${NL}"
          MSG+="📍 Location: ${GEO_LABEL}${NL}"
          MSG+="⏱ Duration: ${DURATION}${NL}"
          if [ -n "$FAILURE_NOTE" ]; then
            MSG+="${NL}${FAILURE_NOTE}${NL}"
          fi
          MSG+="${NL}🔗 <a href='${RUN_URL}'>View Run</a>"

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode="HTML" \
            -d disable_web_page_preview="true" \
            --data-urlencode "text=${MSG}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::warning::Telegram notification failed (HTTP ${HTTP_CODE}): ${BODY}"
          else
            echo "Telegram notification sent successfully"
          fi

      - name: Auto-retry on failure
        if: failure()
        env:
          RETRY_COUNT: ${{ github.event.inputs.retry_count || '0' }}
          MAX_RETRY: "2"
          GH_TOKEN: ${{ github.token }}
        run: |
          CURRENT_RETRY=$((RETRY_COUNT))

          if [ "$CURRENT_RETRY" -ge "$MAX_RETRY" ]; then
            echo "❌ Max retries reached (${CURRENT_RETRY}/${MAX_RETRY}). Giving up."
            exit 0
          fi

          # Clock In window: before 11:30 WIB (buffer from 12:00 limit)
          HOUR=$(date +%H)
          MINUTE=$(date +%M)
          TIME_NUM=$(( HOUR * 60 + MINUTE ))
          CUTOFF=$(( 11 * 60 + 30 ))

          if [ "$TIME_NUM" -ge "$CUTOFF" ]; then
            echo "❌ Outside time window (current: ${HOUR}:${MINUTE}, cutoff: 11:30). Too late to retry."
            exit 0
          fi

          NEXT_RETRY=$((CURRENT_RETRY + 1))
          echo "🔄 Triggering retry #${NEXT_RETRY}..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github.v3+json" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/actions/workflows/clock-in.yml/dispatches" \
            -d "{\"ref\":\"main\",\"inputs\":{\"retry_count\":\"${NEXT_RETRY}\"}}")

          if [ "$HTTP_CODE" = "204" ]; then
            echo "✅ Retry #${NEXT_RETRY} triggered successfully"
          else
            echo "::error::Failed to trigger retry (HTTP ${HTTP_CODE}). Manual re-run required."
            exit 1
          fi
