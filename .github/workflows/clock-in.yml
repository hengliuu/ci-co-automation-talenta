name: Clock In

on:
  workflow_dispatch:

jobs:
  clock-in:
    if: github.event_name == 'workflow_dispatch' || vars.CRON_ENABLED == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TALENTA_EMAIL: ${{ secrets.TALENTA_EMAIL }}
      TALENTA_PASSWORD: ${{ secrets.TALENTA_PASSWORD }}
      HEADLESS: "true"
      TZ: Asia/Jakarta

    steps:
      - name: Record start time
        id: timer
        run: echo "start=$(date +%s)" >> $GITHUB_OUTPUT

      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Route traffic through exit node
        run: sudo -E tailscale set --exit-node=${{ secrets.TS_EXIT_NODE }} --accept-routes

      - name: Verify IP location
        run: curl -s https://ipinfo.io/json | jq '{ip, city, region, country}'

      - name: Random delay
        run: |
          DELAY=$((RANDOM % 421 + 180))
          echo "Waiting ${DELAY}s (~$((DELAY / 60))m) before clock in..."
          sleep $DELAY

      - name: Determine geolocation
        id: geo
        run: |
          DOW=$(date -u +%u)
          if [ "$DOW" = "1" ] || [ "$DOW" = "5" ]; then
            echo "Monday/Friday — using alternate location"
            echo "lat=-6.146282" >> $GITHUB_OUTPUT
            echo "lng=106.810962" >> $GITHUB_OUTPUT
            echo "label=Home (Mon/Fri)" >> $GITHUB_OUTPUT
          else
            echo "Tue-Thu — using default location"
            echo "lat=-6.1993335" >> $GITHUB_OUTPUT
            echo "lng=106.7623687" >> $GITHUB_OUTPUT
            echo "label=Default Office (Tue-Thu)" >> $GITHUB_OUTPUT
          fi

      - name: Record clock time
        id: clock
        run: echo "time=$(date +'%d/%m/%Y %H:%M')" >> $GITHUB_OUTPUT

      - name: Run clock-in
        run: pnpm run clock-in
        env:
          GEO_LAT: ${{ steps.geo.outputs.lat }}
          GEO_LNG: ${{ steps.geo.outputs.lng }}

      - name: Upload error screenshot
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: error-screenshot-clock-in-${{ github.run_number }}
          path: error-*.png
          retention-days: 3

      - name: Notify Telegram
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEO_LABEL: ${{ steps.geo.outputs.label }}
          JOB_STATUS: ${{ job.status }}
          RUN_NUMBER: ${{ github.run_number }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          CLOCK_TIME: ${{ steps.clock.outputs.time }}
          START_TIME: ${{ steps.timer.outputs.start }}
        run: |
          if [ "$JOB_STATUS" = "success" ]; then
            EMOJI="✅"; LABEL="Successful"
          elif [ "$JOB_STATUS" = "cancelled" ]; then
            EMOJI="⚠️"; LABEL="Cancelled"
          else
            EMOJI="❌"; LABEL="Failed!"
          fi

          ELAPSED=$(( $(date +%s) - START_TIME ))
          DURATION="$(( ELAPSED / 60 ))m $(( ELAPSED % 60 ))s"

          FAILURE_NOTE=""
          if [ "$JOB_STATUS" = "failure" ]; then
            FAILURE_NOTE="⚠️ <b>Action Required:</b> Check error screenshot in artifacts."
          fi

          NL=$'\n'
          MSG="${EMOJI} <b>Clock In ${LABEL}</b>${NL}"
          MSG+="─────────────────${NL}"
          MSG+="📋 <b>Details:</b>${NL}"
          MSG+="• Workflow: Clock In${NL}"
          MSG+="• Status: ${JOB_STATUS}${NL}"
          MSG+="• Date: ${CLOCK_TIME} WIB${NL}"
          MSG+="• Run: #${RUN_NUMBER} (Attempt #${RUN_ATTEMPT})${NL}"
          MSG+="${NL}"
          MSG+="📍 Location: ${GEO_LABEL}${NL}"
          MSG+="⏱ Duration: ${DURATION}${NL}"
          if [ -n "$FAILURE_NOTE" ]; then
            MSG+="${NL}${FAILURE_NOTE}${NL}"
          fi
          MSG+="${NL}🔗 <a href='${RUN_URL}'>View Run</a>"

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode="HTML" \
            -d disable_web_page_preview="true" \
            --data-urlencode "text=${MSG}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::warning::Telegram notification failed (HTTP ${HTTP_CODE}): ${BODY}"
          else
            echo "Telegram notification sent successfully"
          fi
