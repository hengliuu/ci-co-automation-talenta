name: Talenta Attendance

on:
  schedule:
    # Clock In: target ~08:45 WIB, compensating GitHub delay
    # 07:20 WIB = 00:20 UTC
    - cron: "20 0 * * 1-5"
    # Clock Out: target ~18:05 WIB, compensating ~30m GitHub delay
    # 17:30 WIB = 10:30 UTC
    - cron: "30 10 * * 1-5"
  workflow_dispatch:
    inputs:
      action:
        description: "Action to run"
        required: true
        type: choice
        options:
          - clock-in
          - clock-out

jobs:
  attendance:
    # Skip cron runs when CRON_ENABLED is not 'true'
    # Manual trigger (workflow_dispatch) always runs regardless
    if: github.event_name == 'workflow_dispatch' || vars.CRON_ENABLED == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TALENTA_EMAIL: ${{ secrets.TALENTA_EMAIL }}
      TALENTA_PASSWORD: ${{ secrets.TALENTA_PASSWORD }}
      HEADLESS: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Determine geolocation
        id: geo
        run: |
          DOW=$(date -u +%u)
          if [ "$DOW" = "1" ] || [ "$DOW" = "5" ]; then
            echo "Monday/Friday — using alternate location"
            echo "lat=-6.209077123779666" >> $GITHUB_OUTPUT
            echo "lng=106.63438083176038" >> $GITHUB_OUTPUT
          else
            echo "Tue-Thu — using default location"
            echo "lat=-6.1993335" >> $GITHUB_OUTPUT
            echo "lng=106.7623687" >> $GITHUB_OUTPUT
          fi

      - name: Determine action
        id: action
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=${{ github.event.inputs.action }}" >> $GITHUB_OUTPUT
          elif [ "$(date -u +%H)" -lt 6 ]; then
            echo "run=clock-in" >> $GITHUB_OUTPUT
          else
            echo "run=clock-out" >> $GITHUB_OUTPUT
          fi

      - name: Run ${{ steps.action.outputs.run }}
        run: pnpm run ${{ steps.action.outputs.run }}
        env:
          GEO_LAT: ${{ steps.geo.outputs.lat }}
          GEO_LNG: ${{ steps.geo.outputs.lng }}

      - name: Upload error screenshot
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-screenshot-${{ steps.action.outputs.run }}-${{ github.run_number }}
          path: error-*.png
          retention-days: 3
